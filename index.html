<!DOCTYPE html>
<html>
<head>
  <title>Drive Link Converter</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
      background: #f5f5f5;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
      margin: 5px;
    }
    #output {
      margin-top: 15px;
      color: green;
      word-break: break-all;
    }
    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <h2>Google Drive Image Link Converter</h2>

  <input id="inputLink" placeholder="Paste Google Drive link here">

  <br>
  <button onclick="convertLink()">Convert</button>
  <button onclick="copyLink()">Copy</button>

  <div id="output"></div>

  <footer>
    <p>Created by <b>Jyotishman Pathak</b></p>
    <p>Email: jyotishmanpathak25@gmail.com</p>
    <p>If you need tools like this, email me 📩</p>
  </footer>

  <script>
    let finalLink = "";

    function convertLink() {
      let link = document.getElementById("inputLink").value;

      let match = link.match(/\/d\/(.*?)(\/|$)/);

      if (match && match[1]) {
        let fileId = match[1];
        finalLink = "https://lh3.googleusercontent.com/d/" + fileId;

        document.getElementById("output").innerHTML =
          "Direct Link:<br>" + finalLink;
      } else {
        document.getElementById("output").innerHTML =
          "❌ Invalid Google Drive link";
        finalLink = "";
      }
    }

    function copyLink() {
      if (finalLink) {
        navigator.clipboard.writeText(finalLink);
        alert("✅ Copied to clipboard!");
      } else {
        alert("⚠️ Convert a link first!");
      }
    }
  </script>

</body>
</html>
